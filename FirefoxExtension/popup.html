<!DOCTYPE html>
<html style="background: #fff; border-radius: 1rem; color: #000;">
  <head>
    <title>Amrita Attendance Fetcher</title>
    <style>
      body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        padding: 20px; 
        margin: 0;
        min-width: 300px;
      }
      h3 {
        margin-top: 0;
        margin-bottom: 20px;
        text-align: center;
        color: #AF0C3E;
      }
      button { 
        background-color: #AF0C3E;
        color: white;
        border: none;
        border-radius: 6px;
        padding: 12px 20px;
        font-size: 14px;
        cursor: pointer;
        width: 100%;
        transition: background-color 0.2s;
      }
      button:hover {
        background-color: #8b0a32;
      }
      pre { 
        min-width: 200px;
        min-height: 0px;
        overflow: auto;  
        padding: 15px; 
        background-color: #f8f9fa;
        border: 1px solid #e9ecef;
        border-radius: 6px;
        margin-top: 15px;
        font-size: 12px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <h3>Amrita Attendance Fetcher</h3>
    <button id="dump">Get Attendance</button>
    <pre id="output" style="min-height: 0;"></pre>
    <script type="module" src="popup.js"></script>
  </body>
</html>
